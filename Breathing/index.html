<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="./breathe.svg">
<link rel="icon" type="image/svg+xml" href="./breathe.svg">
<link rel="apple-touch-icon" href="./breathe.svg">
  <title>Andrum</title>
  <style>
    :root {
      --bg-1: #cffcff;
      --bg-2: #dfeff3;
      --text: #173136;
      --muted: rgba(23, 49, 54, 0.62);
      --soft: rgba(255, 255, 255, 0.58);
      --bubble: rgba(91, 164, 174, 0.38);
      --bubble-core: rgba(255, 255, 255, 0.72);
      --button: #173136;
      --button-text: #ffffff;
      --ring: rgba(91, 164, 174, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.95), transparent 34rem),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
      touch-action: manipulation;
      
    }

    body {
      min-height: 100svh;
    }

    .app {
      min-height: 100svh;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: max(24px, env(safe-area-inset-top)) 22px max(22px, env(safe-area-inset-bottom));
    }

    header {
      text-align: center;
      padding-top: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 5vw, 2.1rem);
      font-weight: 650;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 0.96rem;
      color: var(--muted);
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .bubble-wrap {
      position: relative;
      width: min(68vw, 330px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .aura,
    .breath-bubble,
    .inner-glow {
      position: absolute;
      border-radius: 999px;
      will-change: transform, opacity;
    }

    .aura {
      inset: 2%;
      background: var(--ring);
      filter: blur(20px);
      transform: scale(0.72);
      opacity: 0.46;
    }

    .breath-bubble {
      inset: 13%;
      background:
        radial-gradient(circle at 38% 30%, rgba(255,255,255,0.88), transparent 30%),
        radial-gradient(circle at 62% 72%, rgba(91,164,174,0.28), transparent 44%),
        var(--bubble);
      box-shadow:
        inset 0 0 48px rgba(255,255,255,0.42),
        0 26px 80px rgba(70, 117, 124, 0.14);
      opacity: 0.58;
      transform: translate(0, 0) scale(0.72);
      mix-blend-mode: multiply;
    }

    .bubble-one {
      transform: translate(-4%, -2%) scale(0.72);
    }

    .bubble-two {
      transform: translate(4%, -1%) scale(0.72);
    }

    .bubble-three {
      transform: translate(0%, 5%) scale(0.72);
    }

    .inner-glow {
      width: 48%;
      aspect-ratio: 1;
      background: var(--bubble-core);
      filter: blur(18px);
      opacity: 0.65;
      transform: scale(0.72);
    }

    .breathing .aura,
    .breathing .inner-glow,
    .breathing .bubble-one,
    .breathing .bubble-two,
    .breathing .bubble-three {
      transition:
        transform 90ms linear,
        opacity 90ms linear;
    }

    .center-text {
      position: relative;
      z-index: 2;
      text-align: center;
      user-select: none;
    }

    .phase {
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 250;
      letter-spacing: -0.045em;
      line-height: 1;
      opacity: 1;
      filter: blur(0);
      transform: scale(1);
      transition:
        opacity 820ms ease,
        filter 820ms ease,
        transform 820ms ease;
    }

    .phase.phase-out {
      opacity: 0;
      filter: blur(3px);
      transform: scale(0.985);
    }

    .phase.phase-in-start {
      opacity: 0;
      filter: blur(3px);
      transform: scale(1.115);
    }

    .phase-count {
      margin-top: 12px;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .panel {
      width: min(100%, 430px);
      margin: 0 auto;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.58);
      background: var(--soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(36, 78, 86, 0.11);
    }

    .timer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 4px 6px 14px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .timer {
      color: var(--text);
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      height: 7px;
      background: rgba(23, 49, 54, 0.09);
      border-radius: 999px;
      overflow: hidden;
      margin: 0 6px 14px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(23, 49, 54, 0.58);
      border-radius: inherit;
      transition: width 250ms linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      min-height: 54px;
      border-radius: 999px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .sound-toggle {
      width: 100%;
      min-height: 44px;
      margin-top: 10px;
      background: rgba(255,255,255,0.42);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .audio-note {
      margin: 9px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.76rem;
    }

    .primary {
      background: var(--button);
      color: var(--button-text);
      box-shadow: 0 10px 24px rgba(23, 49, 54, 0.18);
    }

    .secondary {
      width: 54px;
      background: rgba(255,255,255,0.55);
      color: var(--text);
      font-size: 1.15rem;
    }

    button:active {
      transform: scale(0.985);
    }

    .done .breath-bubble,
    .done .aura,
    .done .inner-glow {
      animation: none;
      transform: translate(0, 0) scale(0.86);
      opacity: 0.72;
    }

    @media (min-width: 760px) {
      .app {
        padding-inline: 40px;
      }

      .bubble-wrap {
        width: min(44vw, 380px);
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header>
      <h1>Andrum</h1>
      <p class="subtitle">5 sekunder in · 5 sekunder ut · 5 minuter</p>
    </header>

    <section class="stage" aria-live="polite">
      <div class="bubble-wrap" id="bubbleWrap">
        <div class="aura"></div>
        <div class="breath-bubble bubble-one"></div>
        <div class="breath-bubble bubble-two"></div>
        <div class="breath-bubble bubble-three"></div>
        <div class="inner-glow"></div>

        <div class="center-text">
          <div class="phase" id="phaseText">Redo?</div>
          <div class="phase-count" id="phaseCount">5:00</div>
        </div>
      </div>
    </section>

    <section class="panel" aria-label="Breathing controls">
      <div class="timer-row">
        <span>Session</span>
        <span class="timer" id="timerText">5:00</span>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="controls">
        <button class="primary" id="startPauseBtn">Start</button>
        <button class="secondary" id="resetBtn" aria-label="Reset">↺</button>
      </div>

      <button class="sound-toggle" id="soundToggle" aria-pressed="true">Ljud på</button>
    </section>
  </main>

  <audio id="inhaleAudio" src="inhale.mp3" preload="auto" playsinline></audio>
  <audio id="exhaleAudio" src="exhale.mp3" preload="auto" playsinline></audio>

  <script>
    const SESSION_SECONDS = 5 * 60;
    const PHASE_SECONDS = 5;

    const app = document.getElementById('app');
    const bubbleWrap = document.getElementById('bubbleWrap');
    const phaseText = document.getElementById('phaseText');
    const phaseCount = document.getElementById('phaseCount');
    const timerText = document.getElementById('timerText');
    const progressFill = document.getElementById('progressFill');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const soundToggle = document.getElementById('soundToggle');
    const inhaleAudio = document.getElementById('inhaleAudio');
    const exhaleAudio = document.getElementById('exhaleAudio');

    let running = false;
    let finished = false;
    let elapsedBeforeStart = 0;
    let startedAt = null;
    let rafId = null;
    let soundOn = true;
    let lastPhase = null;

    const SOUND_VOLUME = 0.65;

    inhaleAudio.volume = SOUND_VOLUME;
    exhaleAudio.volume = SOUND_VOLUME;

    let audioContext = null;
    let inhaleBuffer = null;
    let exhaleBuffer = null;
    let audioReady = false;
    let audioLoading = false;
    let useAudioFallback = false;
    let activeSources = [];

    let silentOscillator = null;

    function startSilentLoop() {
      if (!audioContext) return;
      stopSilentLoop();
      
      silentOscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      
      // Mute it almost completely to prevent the 2-minute sleep
      gain.gain.value = 0.00001;
      
      silentOscillator.connect(gain);
      gain.connect(audioContext.destination);
      silentOscillator.start();
    }

    function stopSilentLoop() {
      if (silentOscillator) {
        try {
          silentOscillator.stop();
          silentOscillator.disconnect();
        } catch(e) {}
        silentOscillator = null;
      }
    }

    // Safely decodes audio data for older/strict iOS Safari versions
    function safeDecodeAudio(audioData) {
      return new Promise((resolve, reject) => {
        try {
          const promise = audioContext.decodeAudioData(
            audioData,
            (decoded) => resolve(decoded),
            (err) => reject(err)
          );
          // If the browser does return a promise, catch any errors
          if (promise && typeof promise.catch === 'function') {
            promise.catch(reject);
          }
        } catch (e) {
          reject(e);
        }
      });
    }

    function ensureAudioContextSync() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }

      // iOS Web Audio API Unlock: play 1 frame of empty sound instantly
      const emptyBuffer = audioContext.createBuffer(1, 1, 22050);
      const unlockSource = audioContext.createBufferSource();
      unlockSource.buffer = emptyBuffer;
      unlockSource.connect(audioContext.destination);
      unlockSource.start(0);

      // iOS HTML5 Audio Unlock: instantly play and pause the fallbacks
      inhaleAudio.play().then(() => inhaleAudio.pause()).catch(() => {});
      exhaleAudio.play().then(() => exhaleAudio.pause()).catch(() => {});

      if (soundOn) startSilentLoop();
    }

    async function unlockAudio() {
      if (audioReady || audioLoading) return;
      audioLoading = true;

      try {
        const [inhaleResponse, exhaleResponse] = await Promise.all([
          fetch('inhale.mp3'),
          fetch('exhale.mp3')
        ]);

        if (!inhaleResponse.ok || !exhaleResponse.ok) throw new Error('Load failed');

        const [inhaleArrayBuffer, exhaleArrayBuffer] = await Promise.all([
          inhaleResponse.arrayBuffer(),
          exhaleResponse.arrayBuffer()
        ]);

        // Use the safe decoder wrapper
        inhaleBuffer = await safeDecodeAudio(inhaleArrayBuffer);
        exhaleBuffer = await safeDecodeAudio(exhaleArrayBuffer);

        audioReady = true;
        useAudioFallback = false;
      } catch (error) {
        useAudioFallback = true;
        inhaleAudio.load();
        exhaleAudio.load();
      } finally {
        audioLoading = false;
      }
    }

    function playBreathSound(type) {
      if (!soundOn) return;

      if (audioReady && audioContext) {
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }

        const buffer = type === 'inhale' ? inhaleBuffer : exhaleBuffer;
        if (!buffer) return;

        const source = audioContext.createBufferSource();
        const gain = audioContext.createGain();

        source.buffer = buffer;
        gain.gain.value = SOUND_VOLUME;

        source.connect(gain);
        gain.connect(audioContext.destination);

        activeSources.push(source);
        source.onended = () => {
          activeSources = activeSources.filter((item) => item !== source);
        };

        source.start(0);
        return;
      }

      if (useAudioFallback) {
        const audio = type === 'inhale' ? inhaleAudio : exhaleAudio;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = SOUND_VOLUME;
        audio.play().catch(() => {});
      }
    }

    function stopAllSounds() {
      activeSources.forEach((source) => {
        try {
          source.stop(0);
        } catch (error) {}
      });
      activeSources = [];

      [inhaleAudio, exhaleAudio].forEach((audio) => {
        audio.pause();
        audio.currentTime = 0;
      });
    }

    function setPhaseLabel(nextText) {
      if (phaseText.textContent === nextText || phaseText.dataset.switching === 'true') return;

      phaseText.dataset.switching = 'true';
      phaseText.classList.remove('phase-in-start');
      phaseText.classList.add('phase-out');

      setTimeout(() => {
        phaseText.textContent = nextText;
        phaseText.classList.remove('phase-out');
        phaseText.classList.add('phase-in-start');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            phaseText.classList.remove('phase-in-start');
            phaseText.dataset.switching = 'false';
          });
        });
      }, 860);
    }

    function formatTime(totalSeconds) {
      const safe = Math.max(0, Math.ceil(totalSeconds));
      const minutes = Math.floor(safe / 60);
      const seconds = safe % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function getElapsed() {
      if (!running || startedAt === null) return elapsedBeforeStart;
      return elapsedBeforeStart + (performance.now() - startedAt) / 1000;
    }

    function easeInOut(t) {
      return t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function mix(from, to, amount) {
      return from + (to - from) * amount;
    }

    function syncBubbleAnimation(cyclePosition) {
      const phasePosition = cyclePosition % PHASE_SECONDS;
      const rawProgress = phasePosition / PHASE_SECONDS;
      const isInhale = cyclePosition < PHASE_SECONDS;

      const breathAmount = easeInOut(isInhale ? rawProgress : 1 - rawProgress);

      const smallScale = 0.72;
      const largeScale = 1.30;
      const focusedScale = mix(smallScale, largeScale, breathAmount);
      const auraScale = mix(0.72, 1.30, breathAmount);
      const glowScale = mix(0.64, 0.90, breathAmount);

      const spreadX = mix(0, 10, breathAmount);
      const spreadY = mix(0, 10, breathAmount);

      const bubbleOne = document.querySelector('.bubble-one');
      const bubbleTwo = document.querySelector('.bubble-two');
      const bubbleThree = document.querySelector('.bubble-three');
      const aura = document.querySelector('.aura');
      const glow = document.querySelector('.inner-glow');

      bubbleOne.style.transform = `translate(${-spreadX}%, ${mix(0, -6, breathAmount)}%) scale(${focusedScale})`;
      bubbleTwo.style.transform = `translate(${spreadX}%, ${mix(0, -4, breathAmount)}%) scale(${focusedScale})`;
      bubbleThree.style.transform = `translate(0%, ${spreadY}%) scale(${focusedScale})`;

      bubbleOne.style.opacity = mix(0.86, 0.46, breathAmount);
      bubbleTwo.style.opacity = mix(0.86, 0.44, breathAmount);
      bubbleThree.style.opacity = mix(0.86, 0.42, breathAmount);

      aura.style.transform = `scale(${auraScale})`;
      aura.style.opacity = mix(0.42, 0.72, breathAmount);

      glow.style.transform = `scale(${glowScale})`;
      glow.style.opacity = mix(0.88, 0.38, breathAmount);
    }

    function render() {
      const elapsed = Math.min(getElapsed(), SESSION_SECONDS);
      const remaining = SESSION_SECONDS - elapsed;
      const cyclePosition = elapsed % (PHASE_SECONDS * 2);

      const isInhale = cyclePosition < PHASE_SECONDS;
      const phaseKey = isInhale ? 'inhale' : 'exhale';
      const label = isInhale ? 'Andas in' : 'Andas ut';
      const phaseRemaining = PHASE_SECONDS - (cyclePosition % PHASE_SECONDS);

      syncBubbleAnimation(cyclePosition);

      timerText.textContent = formatTime(remaining);
      phaseCount.textContent = running || finished ? Math.ceil(phaseRemaining) : '5:00';
      progressFill.style.width = `${(elapsed / SESSION_SECONDS) * 100}%`;

      if (finished) {
        setPhaseLabel('Klart');
        phaseCount.textContent = 'Bra';
        return;
      }

      if (!running && elapsed === 0) {
        setPhaseLabel('Redo?');
        phaseCount.textContent = '5:00';
        return;
      }

      setPhaseLabel(label);

      if (running && phaseKey !== lastPhase) {
        playBreathSound(phaseKey);
        lastPhase = phaseKey;
      }

      if (running && elapsed >= SESSION_SECONDS) {
        completeSession();
        return;
      }

      if (running) rafId = requestAnimationFrame(render);
    }

    async function start() {
      await unlockAudio();
      if (finished) reset();
      
      running = true;
      startedAt = performance.now();
      lastPhase = null;
      startPauseBtn.textContent = 'Pausa';
      bubbleWrap.classList.add('breathing');
      app.classList.remove('done');
      cancelAnimationFrame(rafId);
      render();
    }

    function pause() {
      elapsedBeforeStart = getElapsed();
      running = false;
      stopSilentLoop();
      startedAt = null;
      startPauseBtn.textContent = 'Fortsätt';
      stopAllSounds();
      cancelAnimationFrame(rafId);
      render();
    }

    function reset() {
      running = false;
      finished = false;
      elapsedBeforeStart = 0;
      startedAt = null;
      lastPhase = null;
      stopAllSounds();
      startPauseBtn.textContent = 'Start';

      bubbleWrap.classList.remove('breathing');

      app.classList.remove('done');
      cancelAnimationFrame(rafId);
      render();
    }

    function completeSession() {
      running = false;
      stopSilentLoop();
      finished = true;
      elapsedBeforeStart = SESSION_SECONDS;
      startedAt = null;
      stopAllSounds();
      startPauseBtn.textContent = 'Starta om';

      bubbleWrap.classList.remove('breathing');

      app.classList.add('done');
      cancelAnimationFrame(rafId);
      render();
    }

    startPauseBtn.addEventListener('click', () => {
      if (running) {
        pause();
      } else {
        ensureAudioContextSync();
        start();
      }
    });

    resetBtn.addEventListener('click', () => {
      reset();
      stopSilentLoop();
    });

    soundToggle.addEventListener('click', () => {
      soundOn = !soundOn;
      soundToggle.textContent = soundOn ? 'Ljud på' : 'Ljud av';
      soundToggle.setAttribute('aria-pressed', String(soundOn));
      
      if (!soundOn) {
        stopAllSounds();
        stopSilentLoop();
      } else {
        ensureAudioContextSync();
        unlockAudio(); 
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) render();
    });

    render();
  </script>
</body>
</html>
